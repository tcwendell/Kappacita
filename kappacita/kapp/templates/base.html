{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kappacita - {% block title %}{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
</head>
<body class="bg-[#FCFAF8]">

    <div class="flex min-h-screen w-full">
        
        <aside class="w-64 bg-white border-r border-gray-100 hidden lg:block sticky top-0 h-screen">
            {% include 'navbar.html' %}
        </aside>

        <main class="flex-1 overflow-y-auto min-w-0">
            {% block body %}
            {% endblock %}
        </main>

    </div>

</body>
</html>
