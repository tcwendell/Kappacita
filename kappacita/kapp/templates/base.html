{% load static %}
<!DOCTYPE html>

<html lang="{% if perfil %}{{ perfil.idioma }}{% else %}pt-br{% endif %}"
        class="
        {% if perfil.alto_contraste %}alto-contraste {% endif %}
        {% if perfil.tamanho_fonte == 'grande' %}fonte-grande {% endif %}
        {% if perfil.tamanho_fonte == 'muito_grande' %}fonte-muito-grande {% endif %}
        {% if perfil.reduzir_animacoes %}sem-animacoes{% endif %}
    ">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kappacita{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        if (localStorage.getItem('tema') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">

    <style>
        #sidebar-wrapper {
            width: 16rem; /* 256px = w-64 */
            transition: width 0.3s ease, min-width 0.3s ease;
            overflow: hidden;
            flex-shrink: 0;
        }

        #sidebar-wrapper.collapsed {
            width: 0;
            min-width: 0;
        }
    </style>
</head>

<body class="bg-[#FCFAF8] dark:bg-gray-950">

    <div class="flex min-h-screen w-full">
        <aside id="sidebar-wrapper" class="bg-white dark:bg-gray-900 border-r border-gray-100 dark:border-gray-700 hidden lg:flex sticky top-0 h-screen flex-col">
            {% include 'navbar.html' %}
        </aside>
        <main class="flex-1 overflow-y-auto min-w-0">
            {% block body %}
            {% endblock %}
        </main>

    </div>

    <script>
        function toggleTema() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('tema', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('tema', 'dark');
            }
        }

        /* ── exibir Sidebar ── */
        let sidebarAberta = true;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar-wrapper');
            const icon    = document.getElementById('toggleSidebarIcon');

            if (!sidebar || !icon) return;

            sidebarAberta = !sidebarAberta;

            if (sidebarAberta) {
                sidebar.classList.remove('collapsed');
                icon.src = ICON_ANTERIOR;
                icon.alt = 'Ocultar menu';
            } else {
                sidebar.classList.add('collapsed');
                icon.src = ICON_PROXIMO;
                icon.alt = 'Exibir menu';
            }
        }
    </script>
</body>
</html>
