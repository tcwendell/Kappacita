{% load static %}

<header class="h-16 flex items-center justify-between px-4 lg:px-8 bg-white dark:bg-gray-900 shadow-sm transition-colors">
    <div class="flex items-center gap-4 flex-1">
    <button class="p-2 text-[#233e78] dark:text-white hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full">
        <img src="{% static 'img/anterior.svg' %}" class="w-5 h-5" alt="Voltar">
    </button>
    <div class="relative max-w-md w-full hidden md:block">
        <form method="GET" action="">
        <div class="flex items-center bg-[#B9D9F1] dark:bg-gray-700 rounded-full px-4 py-2 shadow-sm">
            <img src="{% static 'img/lupa.svg' %}" class="w-5 h-5 opacity-80" alt="Search">
            <input type="text" name="q" value="{{ request.GET.q }}" placeholder="Pesquisa"
            class="bg-transparent border-none focus:ring-0 text-[#233e78] dark:text-white placeholder-[#233e78]/60 dark:placeholder-white/50 w-full ml-2 text-sm">
        </div>
        </form>
        </div>
    </div>

    <div class="flex items-center gap-2 lg:gap-4">
    <div class="flex items-center gap-1">
        <button onclick="toggleTema()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
        <img src="{% static 'img/darkmode.svg' %}" class="w-6 h-6 dark:hidden" alt="Dark Mode">
        <img src="{% static 'img/lightmode.svg' %}" class="w-6 h-6 hidden dark:block" alt="Light Mode">
        </button>
        <button class="p-2 text-[#233e78] dark:text-white hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full">
        <img src="{% static 'img/sino.svg' %}" class="w-6 h-6" alt="Notifications">
        </button>
    </div>

    <div class="flex items-center gap-3 pl-4 border-l border-[#233e78]/20 dark:border-white/20">
        <div class="text-right hidden sm:block">
        <p class="text-sm font-semibold text-[#233e78] dark:text-white">{{ request.user.get_full_name|default:request.user.username }}</p>
        <p class="text-[10px] text-[#233e78]/70 dark:text-white/50">{{ request.user.email }}</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-[#233e78] border-2 border-white flex items-center justify-center">
    <span class="text-white text-sm font-bold">
        {{ request.user.username|slice:":1"|upper }}
    </span>
</div>
        <button class="text-[#233e78] dark:text-white">
        <img src="{% static 'img/seta_baixo.svg' %}" class="w-5 h-5" alt="Dropdown">
        </button>
    </div>
    </div>
</header>
