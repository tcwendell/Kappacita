{% load static %}

<div class="flex flex-col h-full w-64">
    <div class="p-6 flex flex-col items-center">
        <img src="{% static 'img/logos/kappacitalogo.png' %}" alt="Kappacita Logo" class="w-16 h-16 mb-2">
        <h1 class="text-[#233e78] dark:text-white text-xl font-normal font-[Poppins] whitespace-nowrap">Kappacita</h1>
    </div>

    <nav class="flex-1 px-4 space-y-1 overflow-y-auto no-scrollbar">
        <a href="{% url 'homepage' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_inicio.svg' %}" class="w-4 h-4 flex-shrink-0" alt="Início">
            <span class="whitespace-nowrap">Início</span>
        </a>
        <a href="{% url 'questionario' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_questionario.svg' %}" class="w-4 h-4 flex-shrink-0" alt="Questionário">
            <span class="whitespace-nowrap">Questionário de Perfil</span>
        </a>
        <a href="{% url 'cursos' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_cursos.svg' %}" class="w-4 h-4 flex-shrink-0" alt="Cursos">
            <span class="whitespace-nowrap">Cursos</span>
        </a>
        <a href="{% url 'profissoes' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_profissoes.svg' %}" class="w-4 h-4 flex-shrink-0" alt="Profissões">
            <span class="whitespace-nowrap">Profissões</span>
        </a>
        <a href="{% url 'favoritos' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_favorito.png' %}" class="w-4 h-4 flex-shrink-0" alt="Favoritos">
            <span class="whitespace-nowrap">Favoritos</span>
        </a>
        <a href="{% url 'kappabot' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_kappabot.svg' %}" class="w-4 h-4 flex-shrink-0" alt="KappaBOT">
            <span class="whitespace-nowrap">KappaBOT</span>
        </a>
        <a href="{% url 'meuprogresso' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_progresso.svg' %}" class="w-4 h-4 flex-shrink-0" alt="Progresso">
            <span class="whitespace-nowrap">Meu Progresso</span>
        </a>
    </nav>

    <div class="p-4 border-t border-gray-100 dark:border-gray-700 space-y-1">
        <a href="{% url 'configuracoes' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_config.svg' %}" class="w-4 h-4 flex-shrink-0" alt="Configurações">
            <span class="whitespace-nowrap">Configurações</span>
        </a>
        <a href="{% url 'sair' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-[#171a1f] dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg">
            <img src="{% static 'img/icons/icon_sair.svg' %}" class="w-4 h-4 flex-shrink-0" alt="Sair">
            <span class="whitespace-nowrap">Sair</span>
        </a>
    </div>
</div>
