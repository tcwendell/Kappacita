{% extends 'base.html' %}
{% load static %}

{% block title %}Questionário Vocacional{% endblock %}

{% block body %}
<style>
    .glass-question-card {
        background: rgba(248, 249, 250, 0.95);
        backdrop-filter: blur(16px);
        box-shadow: 0px 0px 20px 0px rgba(23, 26, 31, 0.12), 0px 17px 50px 0px rgba(23, 26, 31, 0.24);
    }
    .option-btn {
        background-color: #5a91bd;
        transition: all 0.3s ease;
    }
    .option-btn:hover {
        transform: translateY(-3px);
        filter: brightness(1.1);
        box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
    }
</style>

<div class="flex-1 flex items-center justify-center p-4 md:p-12 bg-[#81a8cb] min-h-screen">
    
    <div class="glass-question-card w-full max-w-4xl rounded-[32px] p-8 md:p-16 relative overflow-hidden">
        
        <div class="flex flex-col items-center gap-4 mb-12">
            <span class="font-poppins text-sm font-bold text-[#565d6d] uppercase tracking-widest">Etapa 1 de 5</span>
            <div class="flex gap-2 w-full max-w-md">
                <div class="h-2 flex-1 bg-[#233e78] rounded-full shadow-sm"></div>
                <div class="h-2 flex-1 bg-gray-200 rounded-full"></div>
                <div class="h-2 flex-1 bg-gray-200 rounded-full"></div>
                <div class="h-2 flex-1 bg-gray-200 rounded-full"></div>
                <div class="h-2 flex-1 bg-gray-200 rounded-full"></div>
            </div>
        </div>

        <div class="text-center mb-12">
            <h1 class="text-2xl md:text-4xl font-bold font-poppins text-[#233e78] leading-tight mb-4">
                Quais atividades mais te atraem no dia a dia?
            </h1>
            <p class="text-lg text-gray-500 font-medium">
                Selecione até 3 opções que melhor descrevem seu perfil ideal.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
            <button class="option-btn text-white font-poppins font-semibold p-6 rounded-2xl min-h-[100px] flex items-center justify-center text-center shadow-lg">
                Resolver problemas lógicos e matemáticos
            </button>
            <button class="option-btn text-white font-poppins font-semibold p-6 rounded-2xl min-h-[100px] flex items-center justify-center text-center shadow-lg">
                Cuidar e ajudar outras pessoas
            </button>
            <button class="option-btn text-white font-poppins font-semibold p-6 rounded-2xl min-h-[100px] flex items-center justify-center text-center shadow-lg">
                Criar e expressar ideias visualmente
            </button>
            <button class="option-btn text-white font-poppins font-semibold p-6 rounded-2xl min-h-[100px] flex items-center justify-center text-center shadow-lg">
                Pesquisar e analisar informações
            </button>
            <button class="option-btn text-white font-poppins font-semibold p-6 rounded-2xl min-h-[100px] flex items-center justify-center text-center shadow-lg">
                Liderar equipe e tomar decisões
            </button>
            <button class="option-btn text-white font-poppins font-semibold p-6 rounded-2xl min-h-[100px] flex items-center justify-center text-center shadow-lg">
                Programar e desenvolver tecnologias
            </button>
        </div>

        <div class="hidden xl:block absolute left-[-40px] top-1/2 -translate-y-1/2 w-48 pointer-events-none opacity-90">
            <img src="{% static 'img/IMG_8.png' %}" alt="Mascote" class="w-full h-auto">
        </div>

        <div class="mt-16 flex justify-between items-center">
            <button class="text-gray-400 font-bold hover:text-[#233e78] transition-colors flex items-center gap-2">
                <iconify-icon icon="lucide:arrow-left"></iconify-icon>
                Anterior
            </button>
            <button class="bg-[#233e78] text-white px-10 py-3 rounded-full font-bold shadow-xl hover:bg-[#1a2e5a] transition-all flex items-center gap-2">
                Próxima
                <iconify-icon icon="lucide:arrow-right"></iconify-icon>
            </button>
        </div>
    </div>

</div>
{% endblock %}
