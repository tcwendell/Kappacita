{% extends 'base.html' %}
{% load static %}

{% block title %}Kappacita - Perfil de Trabalho{% endblock %}

{% block body %}
<main class="flex-grow flex items-center justify-center p-4 lg:p-8 min-h-screen bg-[#81a8cb]">
  <div class="glass-card w-full max-w-[1013px] rounded-[18px] p-6 lg:p-12 flex flex-col items-center relative overflow-hidden bg-white/95 backdrop-blur-md shadow-2xl">
    
    <div class="flex flex-col items-center gap-3 mb-8 w-full">
      <span class="font-serif-cactus text-sm text-[#565d6d]">Etapa 4 de 5</span>
      <div class="flex gap-2 w-full max-w-[450px]">
        <div class="h-1.5 flex-1 bg-[#233e78] rounded-full shadow-sm"></div> <div class="h-1.5 flex-1 bg-[#233e78] rounded-full shadow-sm"></div> <div class="h-1.5 flex-1 bg-[#233e78] rounded-full shadow-sm"></div> <div class="h-1.5 flex-1 bg-[#233e78] rounded-full shadow-sm"></div> <div class="h-1.5 flex-1 bg-gray-200 rounded-full"></div>
      </div>
    </div>

    <div class="text-center mb-10">
      <h1 class="text-2xl lg:text-[32px] leading-tight text-[#233e78] mb-4 font-bold font-poppins text-balance">
        Como você prefere trabalhar no seu dia a dia?
      </h1>
      <p class="font-serif-cactus text-lg text-[#565d6d]">
        Selecione a opção que melhor descreve seu perfil ideal.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-[700px] relative z-10">
      <button class="h-[107px] w-full bg-[#5a91bd] text-white rounded-[16px] shadow-lg font-serif-cactus text-sm px-6 flex items-center justify-center text-center hover:brightness-110 active:scale-95 transition-all">
        Sozinho, com foco e autonomia
      </button>
      
      <button class="h-[107px] w-full bg-[#5a91bd] text-white rounded-[16px] shadow-lg font-serif-cactus text-sm px-6 flex items-center justify-center text-center hover:brightness-110 active:scale-95 transition-all">
        Em equipe, colaborando com outros
      </button>
      
      <button class="h-[107px] w-full bg-[#5a91bd] text-white rounded-[16px] shadow-lg font-serif-cactus text-sm px-6 flex items-center justify-center text-center hover:brightness-110 active:scale-95 transition-all">
        Com o público, atendendo pessoas
      </button>
      
      <button class="h-[107px] w-full bg-[#5a91bd] text-white rounded-[16px] shadow-lg font-serif-cactus text-sm px-6 flex items-center justify-center text-center hover:brightness-110 active:scale-95 transition-all">
        Em campo, com atividades práticas
      </button>
    </div>

    <div class="absolute left-4 lg:left-10 top-1/2 -translate-y-1/2 hidden xl:block pointer-events-none">
      <img src="{% static 'img/IMG_8.png' %}" alt="Mascot" class="w-[184px] h-auto opacity-90">
    </div>

    <div class="w-full flex justify-between items-center mt-12">
      <a href="{% url 'questionario3' %}" class="flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-[#233e78] transition-colors group">
        <iconify-icon icon="lucide:arrow-left" class="group-hover:-translate-x-1 transition-transform"></iconify-icon>
          Anterior
      </a>

      <a href="{% url 'questionario5' %}" class="bg-[#233e78] text-white px-10 py-3 rounded-full font-bold shadow-xl hover:bg-[#1a2e5a] transition-all flex items-center gap-2 group">
        Próxima
        <iconify-icon icon="lucide:arrow-right" class="group-hover:translate-x-1 transition-transform"></iconify-icon>
      </a>
    </div>
  </div>
</main>
{% endblock %}
