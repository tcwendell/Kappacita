{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kappacita - Entrando com Google</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
    body {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    .bg-hero-image {
        background-image: url("{% static 'img/fundo_inicio.jpeg' %}");
        background-size: cover;
        background-position: center;
    }
    .login-card {
        background-color: #5b90bd;
        box-shadow: 0px 17px 35px 0px rgba(23, 26, 31, 0.24);
    }
    .spinner {
        width: 48px;
        height: 48px;
        border: 5px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        }
    @keyframes spin {
        to { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="min-h-screen bg-hero-image flex items-center justify-center p-4">

    <div class="login-card w-full max-w-[460px] rounded-[40px] p-10 flex flex-col items-center gap-6">

    <!-- Logo -->
    <img src="{% static 'img/marca.png' %}" alt="Kappacita Logo" class="h-20 object-contain">

    <!-- Spinner animado -->
    <div class="spinner mt-4"></div>

    <!-- Mensagem -->
    <div class="text-center mt-2">
        <p class="text-white text-xl font-semibold">Conectando com o Google...</p>
        <p class="text-white/70 text-sm mt-1">Você será redirecionado em instantes.</p>
    </div>

    <!-- Botão de confirmação (form oculto que submete automaticamente) -->
    <form method="post" action="{% url 'socialaccount_signup' %}" id="google-form" class="hidden">
        {% csrf_token %}
        {{ form.as_p }}
    </form>

    </div>

    <script>
    // Submete o formulário automaticamente assim que a página carregar
        window.addEventListener('load', function () {
        document.getElementById('google-form').submit();
        });
    </script>

</body>
</html>
